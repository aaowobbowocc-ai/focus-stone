name: pet_rock
description: 養成小石頭 App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  lottie: ^3.3.2
  shared_preferences: ^2.3.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  fl_chart: ^0.68.0
  http: ^1.2.0
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  device_preview: ^1.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/stone.png
    - assets/read.png
    - assets/background.jpg
    - assets/flower.png
