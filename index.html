<!DOCTYPE html>
<html>
<head>
  <base href="/focus-stone/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="醫學生的專屬讀書陪伴寵物">

  <!-- 禁止瀏覽器自行快取 index.html，確保每次都抓最新版 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="讀書石頭">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>讀書石頭</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // 監聽 Service Worker 更新，通知 Flutter 層
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        // SW 換版時觸發，通知 Flutter 顯示更新 SnackBar
        if (window._flutterSWUpdateCallback) {
          window._flutterSWUpdateCallback();
        }
      });

      navigator.serviceWorker.ready.then(function (reg) {
        reg.addEventListener('updatefound', function () {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', function () {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              if (window._flutterSWUpdateCallback) {
                window._flutterSWUpdateCallback();
              }
            }
          });
        });

        // 每次開啟頁面主動檢查更新
        reg.update();
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
